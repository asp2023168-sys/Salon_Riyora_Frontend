<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | Salon Riyora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-luxury">

    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.jpg" alt="Logo" height="50" class="me-2">
                <span>SALON RIYORA</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center ms-lg-4 mt-3 mt-lg-0 gap-3">
                    <a href="login.html" class="text-gold text-decoration-none fw-bold"><i class="fas fa-user-circle"></i> Login</a>
                    <a href="register.html" class="text-gold text-decoration-none fw-bold"><i class="fas fa-user-plus"></i> Register</a>
                    <a href="booking.html" class="btn btn-gold px-4">Book Now</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-5 position-relative" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="hero-overlay" style="opacity: 0.3;"></div>
        <div class="container py-5 hero-content">
            <div class="row w-100">
                <div class="col-lg-5 mx-auto">
                    <div class="p-5"
                        style="background: rgba(18, 18, 18, 0.9); border: 1px solid var(--gold); backdrop-filter: blur(10px);">
                        <h2 class="text-center mb-4 display-6">Member Login</h2>
                        <div class="mb-5 text-center">
                            <div class="mx-auto" style="width: 60px; height: 1px; background: var(--gold);"></div>
                        </div>

                        <!-- System Alerts -->
                        <div id="alertBox"></div>

                        <form id="loginForm" action="login.php" method="POST">
                            <div class="mb-4">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" name="email" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" name="password" id="password" placeholder="Enter your password" required>
                            </div>
                            
                            <div class="mt-5">
                                <button type="submit" class="btn btn-gold w-100 py-3">Sign In</button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-white-50">Don't have an account? <a href="register.html" class="text-gold text-decoration-none">Create One</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger">${urlParams.get('error')}</div>`;
        } else if (urlParams.has('success')) {
            document.getElementById('alertBox').innerHTML = `<div class="alert alert-success">${urlParams.get('success')}</div>`;
        }
    </script>
</body>
</html>
